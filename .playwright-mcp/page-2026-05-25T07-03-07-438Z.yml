            - code [ref=e710]: "400\">\"text-gray-500 italic\">// SPDX-License-Identifier: MIT 400\">pragma 400\">solidity ^0.8.20; 400\">import 400\">\"@openzeppelin/contracts/token/ERC721/IERC721.sol\"; 400\">import 400\">\"@openzeppelin/contracts/token/ERC721/utils/ERC721Holder.sol\"; 400\">import 400\">\"@openzeppelin/contracts/security/ReentrancyGuard.sol\"; 400\">import 400\">\"@openzeppelin/contracts/access/Ownable.sol\"; 400\">\"text-gray-500 italic\">/** * @title NFTAuction * @notice A decentralized English auction platform 400\">for ERC721 NFTs * @dev Supports English auction with reserve prices, anti-sniping extension, and platform fees */ 400\">contract NFTAuction 400\">is ReentrancyGuard, Ownable, ERC721Holder { 400\">\"text-gray-500 italic\">// ============================================================ 400\">\"text-gray-500 italic\">// Constants & State Variables 400\">\"text-gray-500 italic\">// ============================================================ 400\">\"text-gray-500 italic\">/// @notice Basis points denominator (10000 = 100%) 400\">uint256 400\">public constant BASIS_POINTS = 10000; 400\">\"text-gray-500 italic\">/// @notice Minimum auction duration (1 hour) 400\">uint256 400\">public constant MIN_AUCTION_DURATION = 1 hours; 400\">\"text-gray-500 italic\">/// @notice Anti-sniping buffer time (5 minutes) 400\">uint256 400\">public constant ANTI_SNIPING_BUFFER = 5 minutes; 400\">\"text-gray-500 italic\">/// @notice Platform fee in basis points (200 = 2%) 400\">uint256 400\">public platformFeeBps = 200; 400\">\"text-gray-500 italic\">/// @notice Minimum bid increment in basis points (500 = 5%) 400\">uint256 400\">public minIncrementBps = 500; 400\">\"text-gray-500 italic\">/// @notice Counter 400\">for auction IDs 400\">uint256 400\">public nextAuctionId; 400\">\"text-gray-500 italic\">/// @notice Mapping 400\">from auction ID to Auction 400\">struct 400\">mapping(400\">uint256 => Auction) 400\">public auctions; 400\">\"text-gray-500 italic\">/// @notice Mapping to track active auctions per seller 400\">mapping(400\">address => 400\">uint256[]) 400\">public sellerAuctions; 400\">\"text-gray-500 italic\">// ============================================================ 400\">\"text-gray-500 italic\">// Structs 400\">\"text-gray-500 italic\">// ============================================================ 400\">\"text-gray-500 italic\">/** * @notice Represents an NFT auction */ 400\">struct Auction { 400\">\"text-gray-500 italic\">/// @notice Address of the NFT seller 400\">address seller; 400\">\"text-gray-500 italic\">/// @notice Address of the NFT 400\">contract 400\">address nftContract; 400\">\"text-gray-500 italic\">/// @notice Token ID of the NFT 400\">uint256 tokenId; 400\">\"text-gray-500 italic\">/// @notice Minimum acceptable bid (reserve price) 400\">uint256 reservePrice; 400\">\"text-gray-500 italic\">/// @notice Auction end timestamp 400\">uint256 endTime; 400\">\"text-gray-500 italic\">/// @notice Current highest bidder 400\">address highestBidder; 400\">\"text-gray-500 italic\">/// @notice Current highest bid amount 400\">uint256 highestBid; 400\">\"text-gray-500 italic\">/// @notice Whether the auction has been finalized 400\">bool ended; 400\">\"text-gray-500 italic\">/// @notice Whether the NFT has been transferred 400\">bool nftTransferred; } 400\">\"text-gray-500 italic\">// ============================================================ 400\">\"text-gray-500 italic\">// Events 400\">\"text-gray-500 italic\">// ============================================================ 400\">\"text-gray-500 italic\">/// @notice Emitted when a 400\">new auction 400\">is created 400\">event AuctionCreated( 400\">uint256 indexed auctionId, 400\">address indexed seller, 400\">address indexed nftContract, 400\">uint256 tokenId, 400\">uint256 reservePrice, 400\">uint256 endTime ); 400\">\"text-gray-500 italic\">/// @notice Emitted when a 400\">new bid 400\">is placed 400\">event BidPlaced( 400\">uint256 indexed auctionId, 400\">address indexed bidder, 400\">uint256 amount, 400\">uint256 newEndTime ); 400\">\"text-gray-500 italic\">/// @notice Emitted when a bid 400\">is refunded 400\">event BidRefunded( 400\">uint256 indexed auctionId, 400\">address indexed bidder, 400\">uint256 amount ); 400\">\"text-gray-500 italic\">/// @notice Emitted when an auction ends successfully 400\">event AuctionEnded( 400\">uint256 indexed auctionId, 400\">address indexed winner, 400\">uint256 winningBid, 400\">uint256 sellerPayout, 400\">uint256 platformFee ); 400\">\"text-gray-500 italic\">/// @notice Emitted when an auction 400\">is cancelled (no bids) 400\">event AuctionCancelled(400\">uint256 indexed auctionId, 400\">address indexed seller); 400\">\"text-gray-500 italic\">/// @notice Emitted when an auction ends with no valid bids 400\">event AuctionExpiredNoBids(400\">uint256 indexed auctionId); 400\">\"text-gray-500 italic\">/// @notice Emitted when platform fee 400\">is updated 400\">event PlatformFeeUpdated(400\">uint256 oldFeeBps, 400\">uint256 newFeeBps); 400\">\"text-gray-500 italic\">/// @notice Emitted when minimum increment 400\">is updated 400\">event MinIncrementUpdated(400\">uint256 oldBps, 400\">uint256 newBps); 400\">\"text-gray-500 italic\">// ============================================================ 400\">\"text-gray-500 italic\">// Errors 400\">\"text-gray-500 italic\">// ============================================================ 400\">\"text-gray-500 italic\">/// @notice Thrown when auction ID 400\">is invalid error InvalidAuctionId(400\">uint256 auctionId); 400\">\"text-gray-500 italic\">/// @notice Thrown when caller 400\">is not the seller error NotSeller(); 400\">\"text-gray-500 italic\">/// @notice Thrown when auction has already ended error AuctionAlreadyEnded(); 400\">\"text-gray-500 italic\">/// @notice Thrown when auction has not ended yet error AuctionNotEnded(); 400\">\"text-gray-500 italic\">/// @notice Thrown when auction has already been finalized error AuctionAlreadyFinalized(); 400\">\"text-gray-500 italic\">/// @notice Thrown when bid 400\">is below reserve price error BidBelowReservePrice(400\">uint256 bid, 400\">uint256 reservePrice); 400\">\"text-gray-500 italic\">/// @notice Thrown when bid 400\">is not high enough error BidNotHighEnough(400\">uint256 bid, 400\">uint256 minRequired); 400\">\"text-gray-500 italic\">/// @notice Thrown when seller tries to bid on own auction error SellerCannotBid(); 400\">\"text-gray-500 italic\">/// @notice Thrown when auction has active bids and cannot be cancelled error CannotCancelWithBids(); 400\">\"text-gray-500 italic\">/// @notice Thrown when duration 400\">is too short error DurationTooShort(400\">uint256 provided, 400\">uint256 minimum); 400\">\"text-gray-500 italic\">/// @notice Thrown when reserve price 400\">is zero error ReservePriceZero(); 400\">\"text-gray-500 italic\">/// @notice Thrown when fee exceeds maximum error FeeTooHigh(400\">uint256 provided, 400\">uint256 maximum); 400\">\"text-gray-500 italic\">// ============================================================ 400\">\"text-gray-500 italic\">// Modifiers 400\">\"text-gray-500 italic\">// ============================================================ 400\">\"text-gray-500 italic\">/** * @notice Validates that the auction ID exists * @param auctionId The auction ID to validate */ 400\">modifier validAuction(400\">uint256 auctionId) { 400\">if (auctionId >= nextAuctionId) 400\">revert InvalidAuctionId(auctionId); _; } 400\">\"text-gray-500 italic\">/** * @notice Validates that the auction has not been finalized * @param auctionId The auction ID to check */ 400\">modifier auctionActive(400\">uint256 auctionId) { 400\">if (auctions[auctionId].ended) 400\">revert AuctionAlreadyFinalized(); _; } 400\">\"text-gray-500 italic\">// ============================================================ 400\">\"text-gray-500 italic\">// Constructor 400\">\"text-gray-500 italic\">// ============================================================ 400\">\"text-gray-500 italic\">/** * @notice Initializes the NFT Auction 400\">contract * @param initialOwner Address that will receive platform fees and manage settings */ constructor(400\">address initialOwner) Ownable(initialOwner) {} 400\">\"text-gray-500 italic\">// ============================================================ 400\">\"text-gray-500 italic\">// External Functions - Auction Management 400\">\"text-gray-500 italic\">// ============================================================ 400\">\"text-gray-500 italic\">/** * @notice Creates a 400\">new English auction 400\">for an NFT * @dev The NFT 400\">is transferred to this 400\">contract 400\">as escrow * @param nftContract Address of the ERC721 NFT 400\">contract * @param tokenId Token ID to auction * @param reservePrice Minimum acceptable bid in wei * @param duration Auction duration in seconds * @400\">return auctionId The ID of the created auction */ 400\">function createAuction( 400\">address nftContract, 400\">uint256 tokenId, 400\">uint256 reservePrice, 400\">uint256 duration ) 400\">external 400\">returns (400\">uint256 auctionId) { 400\">\"text-gray-500 italic\">// Validations 400\">if (duration < MIN_AUCTION_DURATION) { 400\">revert DurationTooShort(duration, MIN_AUCTION_DURATION); } 400\">if (reservePrice == 0) 400\">revert ReservePriceZero(); 400\">\"text-gray-500 italic\">// Transfer NFT to this 400\">contract (escrow) IERC721(nftContract).transferFrom(msg.sender, 400\">address(this), tokenId); 400\">\"text-gray-500 italic\">// Create auction auctionId = nextAuctionId++; 400\">uint256 endTime = block.timestamp + duration; auctions[auctionId] = Auction({ seller: msg.sender, nftContract: nftContract, tokenId: tokenId, reservePrice: reservePrice, endTime: endTime, highestBidder: 400\">address(0), highestBid: 0, ended: false, nftTransferred: false }); sellerAuctions[msg.sender].push(auctionId); 400\">emit AuctionCreated(auctionId, msg.sender, nftContract, tokenId, reservePrice, endTime); } 400\">\"text-gray-500 italic\">/** * @notice Places a bid on an active auction (English auction) * @dev Must send ETH higher than current highest bid + minimum increment * Previous highest bidder 400\">is automatically refunded * Anti-sniping: extends auction 400\">if bid placed near end time * @param auctionId The auction to bid on */ 400\">function placeBid(400\">uint256 auctionId) 400\">external 400\">payable nonReentrant validAuction(auctionId) auctionActive(auctionId) { Auction 400\">storage auction = auctions[auctionId]; 400\">\"text-gray-500 italic\">// Validations 400\">if (block.timestamp >= auction.endTime) 400\">revert AuctionAlreadyEnded(); 400\">if (msg.sender == auction.seller) 400\">revert SellerCannotBid(); 400\">\"text-gray-500 italic\">// Calculate minimum required bid 400\">uint256 minRequired; 400\">if (auction.highestBidder == 400\">address(0)) { 400\">\"text-gray-500 italic\">// First bid must meet reserve price minRequired = auction.reservePrice; } 400\">else { 400\">\"text-gray-500 italic\">// Subsequent bids must exceed current + increment minRequired = auction.highestBid + (auction.highestBid * minIncrementBps) / BASIS_POINTS; 400\">\"text-gray-500 italic\">// Ensure at least reserve price 400\">if (minRequired < auction.reservePrice) { minRequired = auction.reservePrice; } } 400\">\"text-gray-500 italic\">// Validate bid amount 400\">if (msg.value < auction.reservePrice) { 400\">revert BidBelowReservePrice(msg.value, auction.reservePrice); } 400\">if (msg.value < minRequired) { 400\">revert BidNotHighEnough(msg.value, minRequired); } 400\">\"text-gray-500 italic\">// Refund"
