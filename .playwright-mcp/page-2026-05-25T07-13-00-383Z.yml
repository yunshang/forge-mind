            - code [ref=e54]: "400\">\"text-gray-500 italic\">// SPDX-License-Identifier: MIT 400\">pragma 400\">solidity ^0.8.20; 400\">import 400\">\"@openzeppelin/contracts/utils/ReentrancyGuard.sol\"; 400\">import 400\">\"@openzeppelin/contracts/access/Ownable.sol\"; 400\">\"text-gray-500 italic\">/** * @title SimpleDeposit * @notice A simple 400\">contract allowing users to deposit and withdraw ETH securely. * @dev Implements ReentrancyGuard to prevent reentrancy attacks and Ownable 400\">for admin functions. */ 400\">contract SimpleDeposit 400\">is ReentrancyGuard, Ownable { 400\">\"text-gray-500 italic\">/// @notice Mapping of user addresses to their deposited balances 400\">mapping(400\">address => 400\">uint256) 400\">private deposits; 400\">\"text-gray-500 italic\">/// @notice Emitted when a user deposits ETH 400\">\"text-gray-500 italic\">/// @param user The 400\">address of the depositor 400\">\"text-gray-500 italic\">/// @param amount The amount of ETH deposited 400\">event Deposited(400\">address indexed user, 400\">uint256 amount); 400\">\"text-gray-500 italic\">/// @notice Emitted when a user withdraws ETH 400\">\"text-gray-500 italic\">/// @param user The 400\">address of the withdrawer 400\">\"text-gray-500 italic\">/// @param amount The amount of ETH withdrawn 400\">event Withdrawn(400\">address indexed user, 400\">uint256 amount); 400\">\"text-gray-500 italic\">/// @notice Emitted when the 400\">contract 400\">is paused or unpaused 400\">\"text-gray-500 italic\">/// @param paused The 400\">new paused state 400\">event PauseToggled(400\">bool paused); 400\">\"text-gray-500 italic\">/// @dev Contract pause state 400\">bool 400\">private _paused; 400\">modifier whenNotPaused() { 400\">require(!_paused, 400\">\"SimpleDeposit: 400\">contract 400\">is paused\"); _; } 400\">\"text-gray-500 italic\">/** * @notice Constructor sets the 400\">contract owner * @param initialOwner The 400\">address to set 400\">as the 400\">contract owner */ constructor(400\">address initialOwner) Ownable(initialOwner) {} 400\">\"text-gray-500 italic\">/** * @notice Allows a user to deposit ETH into the 400\">contract * @dev Users must send a non-zero amount of ETH */ 400\">function deposit() 400\">external 400\">payable whenNotPaused { 400\">require(msg.value > 0, 400\">\"SimpleDeposit: must deposit a non-zero amount\"); 400\">\"text-gray-500 italic\">// Effects: Update state before any 400\">external interactions deposits[msg.sender] += msg.value; 400\">\"text-gray-500 italic\">// Interactions: Emit 400\">event (400\">event emission 400\">is safe) 400\">emit Deposited(msg.sender, msg.value); } 400\">\"text-gray-500 italic\">/** * @notice Allows a user to withdraw their deposited ETH * @dev Follows checks-effects-interactions pattern and uses ReentrancyGuard * @param amount The amount of ETH to withdraw */ 400\">function withdraw(400\">uint256 amount) 400\">external nonReentrant whenNotPaused { 400\">require(amount > 0, 400\">\"SimpleDeposit: must withdraw a non-zero amount\"); 400\">\"text-gray-500 italic\">// Checks: Verify the user has sufficient balance 400\">uint256 balance = deposits[msg.sender]; 400\">require(balance >= amount, 400\">\"SimpleDeposit: insufficient balance\"); 400\">\"text-gray-500 italic\">// Effects: Update state BEFORE 400\">external call deposits[msg.sender] = balance - amount; 400\">\"text-gray-500 italic\">// Interactions: Transfer ETH to the user (400\">bool success, ) = 400\">payable(msg.sender).call{value: amount}(400\">\"\"); 400\">require(success, 400\">\"SimpleDeposit: transfer failed\"); 400\">emit Withdrawn(msg.sender, amount); } 400\">\"text-gray-500 italic\">/** * @notice Allows a user to withdraw all of their deposited ETH * @dev Convenience 400\">function that withdraws the caller's entire balance */ 400\">function withdrawAll() 400\">external nonReentrant whenNotPaused { 400\">\"text-gray-500 italic\">// Checks: Get the user's balance 400\">uint256 balance = deposits[msg.sender]; 400\">require(balance > 0, 400\">\"SimpleDeposit: no balance to withdraw\"); 400\">\"text-gray-500 italic\">// Effects: Update state BEFORE 400\">external call deposits[msg.sender] = 0; 400\">\"text-gray-500 italic\">// Interactions: Transfer ETH to the user (400\">bool success, ) = 400\">payable(msg.sender).call{value: balance}(400\">\"\"); 400\">require(success, 400\">\"SimpleDeposit: transfer failed\"); 400\">emit Withdrawn(msg.sender, balance); } 400\">\"text-gray-500 italic\">/** * @notice Returns the deposited balance of a given user * @param user The 400\">address to query * @400\">return The user's deposited balance in wei */ 400\">function getDeposit(400\">address user) 400\">external 400\">view 400\">returns (400\">uint256) { 400\">return deposits[user]; } 400\">\"text-gray-500 italic\">/** * @notice Returns the total ETH held by this 400\">contract * @400\">return The 400\">contract's ETH balance in wei */ 400\">function getContractBalance() 400\">external 400\">view 400\">returns (400\">uint256) { 400\">return 400\">address(this).balance; } 400\">\"text-gray-500 italic\">/** * @notice Allows the owner to pause or unpause the 400\">contract * @param paused True to pause, false to unpause */ 400\">function togglePause(400\">bool paused) 400\">external onlyOwner { _paused = paused; 400\">emit PauseToggled(paused); } 400\">\"text-gray-500 italic\">/** * @notice Returns whether the 400\">contract 400\">is currently paused * @400\">return True 400\">if paused, false otherwise */ 400\">function isPaused() 400\">external 400\">view 400\">returns (400\">bool) { 400\">return _paused; } }"
