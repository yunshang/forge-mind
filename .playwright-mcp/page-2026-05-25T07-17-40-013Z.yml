            - code [ref=e54]: "400\">\"text-gray-500 italic\">// SPDX-License-Identifier: MIT 400\">pragma 400\">solidity ^0.8.20; 400\">import 400\">\"@openzeppelin/contracts/access/Ownable.sol\"; 400\">import 400\">\"@openzeppelin/contracts/utils/Pausable.sol\"; 400\">\"text-gray-500 italic\">/** * @title TestContract * @author Developer * @notice A simple test 400\">contract demonstrating basic Solidity patterns * @dev Includes ownership, pausability, and basic 400\">storage functionality */ 400\">contract TestContract 400\">is Ownable, Pausable { 400\">\"text-gray-500 italic\">// ========== STATE VARIABLES ========== 400\">\"text-gray-500 italic\">/// @notice Mapping of addresses to their stored values 400\">mapping(400\">address => 400\">uint256) 400\">public values; 400\">\"text-gray-500 italic\">/// @notice Mapping of addresses to their name registrations 400\">mapping(400\">address => 400\">string) 400\">public names; 400\">\"text-gray-500 italic\">/// @notice Total number of registered users 400\">uint256 400\">public totalRegistered; 400\">\"text-gray-500 italic\">/// @notice Minimum value threshold 400\">uint256 400\">public minValue; 400\">\"text-gray-500 italic\">// ========== EVENTS ========== 400\">\"text-gray-500 italic\">/// @notice Emitted when a user sets their value 400\">event ValueSet(400\">address indexed user, 400\">uint256 value); 400\">\"text-gray-500 italic\">/// @notice Emitted when a user registers their name 400\">event NameRegistered(400\">address indexed user, 400\">string name); 400\">\"text-gray-500 italic\">/// @notice Emitted when minimum value 400\">is updated 400\">event MinValueUpdated(400\">uint256 oldValue, 400\">uint256 newValue); 400\">\"text-gray-500 italic\">/// @notice Emitted when 400\">contract 400\">is paused or unpaused 400\">event ContractPaused(400\">address indexed by, 400\">bool paused); 400\">\"text-gray-500 italic\">// ========== MODIFIERS ========== 400\">\"text-gray-500 italic\">/// @notice Ensures the value meets minimum threshold 400\">\"text-gray-500 italic\">/// @param _value The value to check 400\">modifier meetsMinimumValue(400\">uint256 _value) { 400\">require(_value >= minValue, 400\">\"Value below minimum threshold\"); _; } 400\">\"text-gray-500 italic\">/// @notice Ensures the name 400\">is not empty 400\">\"text-gray-500 italic\">/// @param _name The name to check 400\">modifier validName(400\">string 400\">memory _name) { 400\">require(400\">bytes(_name).length > 0, 400\">\"Name cannot be empty\"); 400\">require(400\">bytes(_name).length <= 50, 400\">\"Name too long\"); _; } 400\">\"text-gray-500 italic\">// ========== CONSTRUCTOR ========== 400\">\"text-gray-500 italic\">/** * @notice Initializes the 400\">contract with owner and minimum value * @param _owner The initial owner 400\">address * @param _minValue The minimum value threshold 400\">for operations */ constructor(400\">address _owner, 400\">uint256 _minValue) Ownable(_owner) { 400\">require(_owner != 400\">address(0), 400\">\"Invalid owner 400\">address\"); minValue = _minValue; } 400\">\"text-gray-500 italic\">// ========== EXTERNAL FUNCTIONS ========== 400\">\"text-gray-500 italic\">/** * @notice Sets the caller's stored value * @dev Must meet minimum value threshold * @param _value The value to store */ 400\">function setValue(400\">uint256 _value) 400\">external whenNotPaused meetsMinimumValue(_value) { values[msg.sender] = _value; 400\">emit ValueSet(msg.sender, _value); } 400\">\"text-gray-500 italic\">/** * @notice Registers a name 400\">for the caller * @dev Increments totalRegistered 400\">if 400\">new registration * @param _name The name to register (1-50 characters) */ 400\">function registerName(400\">string 400\">calldata _name) 400\">external whenNotPaused validName(_name) { 400\">bool isNew = 400\">bytes(names[msg.sender]).length == 0; names[msg.sender] = _name; 400\">if (isNew) { totalRegistered++; } 400\">emit NameRegistered(msg.sender, _name); } 400\">\"text-gray-500 italic\">/** * @notice Resets the caller's stored value to zero */ 400\">function resetValue() 400\">external whenNotPaused { values[msg.sender] = 0; 400\">emit ValueSet(msg.sender, 0); } 400\">\"text-gray-500 italic\">// ========== OWNER FUNCTIONS ========== 400\">\"text-gray-500 italic\">/** * @notice Updates the minimum value threshold * @param _newMinValue The 400\">new minimum value */ 400\">function setMinValue(400\">uint256 _newMinValue) 400\">external onlyOwner { 400\">uint256 oldMinValue = minValue; minValue = _newMinValue; 400\">emit MinValueUpdated(oldMinValue, _newMinValue); } 400\">\"text-gray-500 italic\">/** * @notice Pauses the 400\">contract */ 400\">function pause() 400\">external onlyOwner { _pause(); 400\">emit ContractPaused(msg.sender, true); } 400\">\"text-gray-500 italic\">/** * @notice Unpauses the 400\">contract */ 400\">function unpause() 400\">external onlyOwner { _unpause(); 400\">emit ContractPaused(msg.sender, false); } 400\">\"text-gray-500 italic\">// ========== VIEW FUNCTIONS ========== 400\">\"text-gray-500 italic\">/** * @notice Gets the stored value and name 400\">for a user * @param _user The user 400\">address to query * @400\">return _value The user's stored value * @400\">return _name The user's registered name */ 400\">function getUserInfo(400\">address _user) 400\">external 400\">view 400\">returns (400\">uint256 _value, 400\">string 400\">memory _name) { 400\">return (values[_user], names[_user]); } 400\">\"text-gray-500 italic\">/** * @notice Checks 400\">if a user has registered a name * @param _user The user 400\">address to check * @400\">return True 400\">if the user has a registered name */ 400\">function hasName(400\">address _user) 400\">external 400\">view 400\">returns (400\">bool) { 400\">return 400\">bytes(names[_user]).length > 0; } 400\">\"text-gray-500 italic\">/** * @notice Accepts ETH deposits (400\">for testing) */ receive() 400\">external 400\">payable {} 400\">\"text-gray-500 italic\">/** * @notice Accepts ETH with data (400\">for testing) */ fallback() 400\">external 400\">payable {} }"
